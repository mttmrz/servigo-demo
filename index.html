<!DOCTYPE html>
<html>
<head>
  <base href="/servigo-demo/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Servigo – Hospitality services platform">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="servigo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Servigo – Demo</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }
    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .label {
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      user-select: none;
    }
    .phone {
      position: relative;
      width: 393px;
      height: 852px;
      background: #1c1c1e;
      border-radius: 54px;
      box-shadow:
        0 0 0 1px #3a3a3c,
        0 0 0 3px #1c1c1e,
        0 0 0 4px #3a3a3c,
        0 30px 80px rgba(0,0,0,0.8),
        0 0 60px rgba(0,100,255,0.08);
      overflow: hidden;
    }
    .phone::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 160px;
      width: 4px;
      height: 38px;
      background: #3a3a3c;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 54px 0 #3a3a3c, 0 100px 0 #3a3a3c;
      z-index: 20;
    }
    .phone::after {
      content: '';
      position: absolute;
      right: -4px;
      top: 200px;
      width: 4px;
      height: 68px;
      background: #3a3a3c;
      border-radius: 0 2px 2px 0;
      z-index: 20;
    }
    .screen {
      position: absolute;
      inset: 0;
      border-radius: 54px;
      overflow: hidden;
      background: #000;
    }
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
      pointer-events: none;
    }
    #flutter-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .demo-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 6px 14px;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
    }
    .demo-badge .dot {
      width: 6px;
      height: 6px;
      background: #34d399;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @media (max-height: 950px) {
      .phone { transform: scale(0.88); transform-origin: center center; margin: -50px 0; }
    }
    @media (max-height: 820px) {
      .phone { transform: scale(0.76); transform-origin: center center; margin: -100px 0; }
    }
    @media (max-width: 500px) {
      body { background: #000; overflow: auto; }
      .scene { gap: 0; }
      .label, .demo-badge { display: none; }
      .phone { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; transform: none; margin: 0; }
      .screen { border-radius: 0; }
      .dynamic-island { display: none; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <span class="label">Servigo</span>
    <div class="phone">
      <div class="screen">
        <div class="dynamic-island"></div>
        <iframe id="flutter-frame" src="app.html"></iframe>
      </div>
    </div>
    <div class="demo-badge">
      <span class="dot"></span>
      Live demo &middot; Supabase backend
    </div>
  </div>
</body>
</html>
