<!DOCTYPE html>
<html>
<head>
  <base href="/servigo-demo/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Servigo – Hospitality services platform">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="servigo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Servigo – Demo</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .label {
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    /* Phone shell — sized with CSS vars so we can scale without transform */
    .phone {
      --ph: min(852px, 90vh);
      --pw: calc(var(--ph) * 393 / 852);
      position: relative;
      width: var(--pw);
      height: var(--ph);
      background: #1c1c1e;
      border-radius: calc(54px * var(--ph) / 852);
      box-shadow:
        0 0 0 1px #3a3a3c,
        0 0 0 3px #1c1c1e,
        0 0 0 5px #3a3a3c,
        0 24px 70px rgba(0,0,0,0.85),
        0 0 50px rgba(0,80,255,0.08);
      flex-shrink: 0;
    }

    /* Left side buttons */
    .phone::before {
      content: '';
      position: absolute;
      left: -5px;
      top: calc(var(--ph) * 162 / 852);
      width: 5px;
      height: calc(var(--ph) * 32 / 852);
      background: #3a3a3c;
      border-radius: 3px 0 0 3px;
      box-shadow:
        0 calc(var(--ph) * 50 / 852) 0 #3a3a3c,
        0 calc(var(--ph) * 124 / 852) 0 #3a3a3c;
    }
    /* Right button */
    .phone::after {
      content: '';
      position: absolute;
      right: -5px;
      top: calc(var(--ph) * 230 / 852);
      width: 5px;
      height: calc(var(--ph) * 90 / 852);
      background: #3a3a3c;
      border-radius: 0 3px 3px 0;
    }

    .screen {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      overflow: hidden;
    }

    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: calc(var(--ph) * 12 / 852);
      left: 50%;
      transform: translateX(-50%);
      width: calc(var(--pw) * 120 / 393);
      height: calc(var(--ph) * 34 / 852);
      background: #000;
      border-radius: 20px;
      z-index: 10;
      pointer-events: none;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      /* Force crisp rendering — avoids subpixel blur */
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    .demo-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 6px 14px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
    }
    .dot {
      width: 6px; height: 6px;
      background: #34d399;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Real mobile: full screen */
    @media (max-width: 500px) {
      body { background: #fff; gap: 0; }
      body::before { display: none; }
      .phone { --ph: 100vh; --pw: 100vw; border-radius: 0; box-shadow: none; }
      .phone::before, .phone::after { display: none; }
      .label, .demo-badge, .dynamic-island { display: none; }
    }
  </style>
</head>
<body>
  <span class="label">Servigo</span>
  <div class="phone">
    <div class="screen">
      <div class="dynamic-island"></div>
      <iframe src="app.html"></iframe>
    </div>
  </div>
  <div class="demo-badge">
    <span class="dot"></span>
    Live demo &middot; Supabase backend
  </div>
</body>
</html>
