<!DOCTYPE html>
<html>
<head>
  <base href="/servigo-demo/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Servigo – Hospitality services platform">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="servigo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Servigo – Demo</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    html::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* Flutter renders inside body — body is the phone screen */
    body {
      width: 393px;
      height: 852px;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      overflow: hidden;
      background: #fff;
      /* Massive box-shadow blacks out everything outside the phone screen */
      box-shadow:
        0 0 0 9999px rgba(12, 18, 40, 0.94),
        0 32px 80px rgba(0,0,0,0.9),
        0 0 80px rgba(0,80,255,0.12);
    }

    /* Phone bezel — decorative overlay, never captures pointer events */
    #phone-bezel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 393px;
      height: 852px;
      pointer-events: none;
      z-index: 9999;
      border-radius: 54px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.10),
        0 0 0 1.5px #3a3a3c,
        0 0 0 3.5px #1c1c1e,
        0 0 0 5px #3a3a3c;
    }

    /* Dynamic Island */
    #phone-bezel::after {
      content: '';
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
    }

    /* Side buttons */
    .btn { position: absolute; background: #3a3a3c; }
    .btn-silent  { left: -5px; top: 162px; width: 5px; height: 32px; border-radius: 3px 0 0 3px; }
    .btn-vol-up  { left: -5px; top: 212px; width: 5px; height: 62px; border-radius: 3px 0 0 3px; }
    .btn-vol-dn  { left: -5px; top: 286px; width: 5px; height: 62px; border-radius: 3px 0 0 3px; }
    .btn-power   { right: -5px; top: 230px; width: 5px; height: 90px; border-radius: 0 3px 3px 0; }

    /* Labels */
    #servigo-label {
      position: fixed;
      top: calc(50% - 452px - 28px);
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }
    #demo-badge {
      position: fixed;
      top: calc(50% + 452px + 16px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 6px 14px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }
    .dot {
      width: 6px; height: 6px;
      background: #34d399;
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Real mobile: full screen, no chrome */
    @media (max-width: 500px) {
      html { background: #fff; }
      html::before { display: none; }
      body {
        width: 100vw;
        height: 100%;
        position: static;
        transform: none;
        box-shadow: none;
      }
      #phone-bezel, #demo-badge, #servigo-label { display: none; }
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>

<div id="phone-bezel">
  <div class="btn btn-silent"></div>
  <div class="btn btn-vol-up"></div>
  <div class="btn btn-vol-dn"></div>
  <div class="btn btn-power"></div>
</div>
<div id="servigo-label">Servigo</div>
<div id="demo-badge">
  <span class="dot"></span>
  Live demo &middot; Supabase backend
</div>
</html>
